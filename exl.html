<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Department Responsibilities & Authoritie - مهام وصلاحيات الاقسام</title>
<style>
    :root {
        --bg-color: #080c14;
        --accent-color: #3a86ff;
        --text-color: #ffffff;
        --muted-text: #94a3b8;
        --card-bg: rgba(15, 22, 38, 0.8);
    }
/* الأنيميشن */
    @keyframes fadeInAnimation {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        line-height: 1.6;
        background-image: linear-gradient(rgba(8, 12, 20, 0.9), rgba(8, 12, 20, 0.9)), url('art599.png');
        background-size: cover;
        background-attachment: fixed;
        /* هنا تفعيل الأنيميشن */
        animation: fadeInAnimation ease 1s;
   }

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    direction: ltr;
    padding: 20px 8%;
    background: rgba(15, 22, 38, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    position: sticky;
    top: 0;
    z-index: 100;
}




    /* تنسيق صندوق حماية كلمة المرور */
    #password-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-color); display: flex; flex-direction: column;
        justify-content: center; align-items: center; z-index: 9999;
        animation: fadeIn 0.5s ease-out;
    }
    .pass-box { background: rgba(15, 22, 38, 0.9); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--accent-color); }
    #password-overlay input { padding: 12px; border-radius: 5px; border: none; margin-bottom: 15px; width: 250px; outline: none; }
    #password-overlay button { padding: 10px 25px; background: var(--accent-color); color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
    #password-overlay button:hover { background: #2563eb; }
    #error-msg { color: red; font-size: 14px; margin-top: 10px; display: none; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 8%; background: rgba(15, 22, 38, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .logo { font-size: 24px; font-weight: bold; }
    .logo span { color: var(--accent-color); }
    .nav-home-btn { background-color: #1e6091; color: white; padding: 10px 25px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    .container { padding: 0 20px; max-width: 1000px; margin: 40px auto; }
    h1 { font-size: 36px; text-align: center; margin-bottom: 30px; }
    .rank-item { margin-bottom: 25px; font-size: 18px; line-height: 1.8; }
    .rank-item strong { color: var(--accent-color); display: block; margin-bottom: 8px; font-size: 20px; }

        footer {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted-text);
        font-size: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 50px;
    }


</style>
</head>
<body>

    <header>
        <div class="logo">Art Police <span> Department Schedule</span></div>
        <a href="index.html" class="nav-home-btn">الرئيسية</a>
    </header>

    <div class="container">
        <h1>الجدول العسكري \ Department Schedule </h1>
        <!-- باقي محتوى الصفحة كما هو -->
    <div class="rank-section">
            <div class="card">
    <iframe src="https://docs.google.com/spreadsheets/d/1DDR9ckor63llPdwoNLUW0Tw9xQNMX3FvWFGcNDbW8ks/edit?usp=sharing" width="170%" height="1000" frameborder="0"></iframe>
</div>

</div>

<footer>
    <p>All Rights Reserved X.X95 © 2026</p>
    <p>Designed by X.X95</p>
</footer>


</body>
</html>
