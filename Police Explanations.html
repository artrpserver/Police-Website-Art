<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Police Explanations - شروحات الشرطة</title>
<style>
    :root {
        --bg-color: #080c14;
        --accent-color: #3a86ff;
        --text-color: #ffffff;
        --muted-text: #94a3b8;
        --card-bg: rgba(15, 22, 38, 0.8);
    }

    @keyframes fadeInAnimation {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        line-height: 1.6;
        background-size: cover;
        background-image: linear-gradient(rgba(8, 12, 20, 0.9), rgba(8, 12, 20, 0.9)), url('art599.png');
        background-attachment: fixed;
        animation: fadeInAnimation ease 1s;
    }

    /* الهيدر بعد التعديل ليكون العنوان يساراً والزر يميناً */
    header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 20px 8%; 
        background: rgba(15, 22, 38, 0.8); 
        backdrop-filter: blur(10px); 
        border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
    }

    .logo { font-size: 24px; font-weight: bold; }
    .logo span { color: var(--accent-color); }
    
    .nav-home-btn { 
        background-color: #1e6091; 
        color: white; 
        padding: 8px 25px; 
        border-radius: 5px; 
        text-decoration: none; 
        font-weight: bold; 
    }
    
    .container { padding: 0 20px; max-width: 1000px; margin: 40px auto; }
    h1 { color: #ffffff; text-align: center; margin-bottom: 50px; border-bottom: 2px solid #6d7a8f; padding-bottom: 20px; }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 30px;
    }

    .card {
        background: rgba(25, 30, 45, 0.9);
        padding: 20px;
        border-radius: 15px;
        border: 1px solid #3a86ff;
    }

    .card h3 { color: #fff; margin-bottom: 15px; }

    iframe {
        width: 100%;
        height: 220px;
        border-radius: 10px;
        border: 1px solid #505764;
    }

    footer {
        text-align: center;
        padding: 40px 20px;
        color: var(--muted-text);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 60px;
        font-size: 14px;
    }
</style>
</head>
<body>

<header>
        <a href="index.html" class="nav-home-btn">الرئيسية</a>
        
        <div class="logo">Police <span>Explanations</span></div>
    </header>
    
    <div class="container">
        <h1>شروحات الشرطة \ Police Explanations</h1>
        
        <div class="grid">
            <div class="card">
                <h3>شرح MDT</h3>
                <iframe src="https://www.youtube.com/embed/cNYqY6vPKHo?si=mZtM0dlpWllYcxd7" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>

            <div class="card">
                <h3>شرح field-Distribution</h3>
                <div style="height: 220px; display: flex; align-items: center; justify-content: center; background: #1a1f2e; border-radius: 10px; color: #505764;">
                    ...Soon
                </div>
            </div>

            <div class="card">
                <h3>شرح Dispatch</h3>
                <div style="height: 220px; display: flex; align-items: center; justify-content: center; background: #1a1f2e; border-radius: 10px; color: #505764;">
                    ...Soon
                </div>
            </div>

            <div class="card">
                <h3>شرح Break</h3>
                <div style="height: 220px; display: flex; align-items: center; justify-content: center; background: #1a1f2e; border-radius: 10px; color: #505764;">
                    ...Soon
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>All Rights Reserved X.X95 © 2026</p>
        <p>Designed by X.X95</p>
    </footer>

</body>
</html>
